name: Kiểm tra chất lượng website

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  regression-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v4
      - name: Cài Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Cài thư viện kiểm thử
        run: npm ci
      - name: Chạy kiểm thử hồi quy
        run: npm test
